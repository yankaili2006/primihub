name: build node image (arm64, GitHub-hosted)

# Manual trigger. Builds the primihub node for arm64 INSIDE a ubuntu:20.04
# (focal, glibc 2.31) container on a native GitHub-hosted arm64 runner, so the
# binary is glibc-compatible with the Dockerfile.release runtime (FROM ubuntu:20.04).
# bazel is invoked directly with --config=linux_aarch64 (the Makefile hardcodes
# linux_x86_64, so we bypass it).
#
# Ships commit d57875b "fix(grpc): FL/inter-node gRPC keepalive to stop
# too_many_pings GOAWAY hang" -> deployable arm64 node image. The offline
# ArmVerify node binary predates that fix so 2-party PSI/FL hangs (stuck at
# IN_OPERATION=2) when inter-node gRPC pings get GOAWAY'd.
on:
  workflow_dispatch:
    inputs:
      push:
        description: 'push image to aliyun registry'
        required: false
        default: 'false'

jobs:
  build-node-arm64:
    runs-on: ubuntu-24.04-arm
    env:
      REG: registry.cn-beijing.aliyuncs.com/primihub
    steps:
      - uses: actions/checkout@v4

      - name: bazel build node in focal arm64 container (linux_aarch64)
        run: |
          docker run --rm -v "$PWD":/src -w /src ubuntu:20.04 bash -c '
            set -e
            export LANG=C.UTF-8 DEBIAN_FRONTEND=noninteractive USE_BAZEL_VERSION=5.0.0
            apt-get update
            apt-get install -y python3 python3-dev python2 python2-dev gcc-8 g++-8 libgmp-dev python3-pip tzdata cmake \
              libmysqlclient-dev chrpath automake ca-certificates git libtool m4 patch pkg-config \
              unzip make wget curl zip ninja-build npm xz-utils
            [ -e /usr/bin/python2 ] || ln -sf /usr/bin/python2.7 /usr/bin/python2
            update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-8 800 --slave /usr/bin/g++ g++ /usr/bin/g++-8
            npm install -g @bazel/bazelisk
            mkdir -p /tmp/gmp_extracted && tar xf gmp-6.2.1.tar.xz -C /tmp/gmp_extracted/
            # WORKSPACE python3 repo points at third_party/python_headers (pre_build.sh normally
            # symlinks it; we do just that, skipping pre_build.sh which clobbers a good BUILD.bazel)
            PYINC=$(python3-config --includes | awk "{print \$1}" | sed "s/^-I//")
            ( cd third_party && rm -f python_headers && ln -s "$PYINC" python_headers )
            # Use the portable CN build config (OSS + github mirrors) instead of the default
            # WORKSPACE (which has dev-machine file:/// paths). Convert gitee SSH -> HTTPS so no
            # gitee deploy key is needed on the GitHub runner.
            cp ci/cn-build/WORKSPACE.cn WORKSPACE
            cp ci/cn-build/repository_deps.cn.bzl bazel/repository_deps.bzl
            [ -f ci/cn-build/WORKSPACE_GITHUB.cn ] && cp ci/cn-build/WORKSPACE_GITHUB.cn WORKSPACE_GITHUB || true
            for f in WORKSPACE WORKSPACE_GITHUB bazel/repository_deps.bzl; do
              [ -f "$f" ] && sed -i \
                -e "s|git@gitee.com:|https://gitee.com/|g" \
                -e "s|https://primihub.oss-cn-beijing.aliyuncs.com/tools/gmp-6.2.1.tar.xz|file:///tmp/gmp_extracted/gmp-6.2.1.tar.xz|g" \
                -e "s|file:///home/primihub/local_deps/private-join-and-compute-master.zip|https://primihub.oss-cn-beijing.aliyuncs.com/tools/private-join-and-compute-master.zip|g" \
                -e "s|f8cbd621aa404ace22b6ba1f578804b5f444433d3965274d13724db3b2760a24|ddd13c10c6ad3e4a5e488180ebb930ad5ed6a1d2416d7e7b2b07695c73e2fa50|g" \
                "$f"
            done
            mkdir -p /tmp/ph_distdir
            bazelisk build --config=linux_aarch64 --define enable_py_task=true \
              :node :cli //:task_main \
              //src/primihub/pybind_wrapper:linkcontext \
              //src/primihub/pybind_wrapper:opt_paillier_c2py \
              //src/primihub/task/pybind_wrapper:ph_secure_lib
            cp -f bazel-bin/src/primihub/pybind_wrapper/linkcontext.so python/ || true
            cp -f bazel-bin/src/primihub/pybind_wrapper/opt_paillier_c2py.so python/ || true
            cp -f bazel-bin/src/primihub/task/pybind_wrapper/ph_secure_lib.so python/ || true
            cp -f bazel-bin/src/primihub/protos/*.py python/primihub/client/ph_grpc/src/primihub/protos/ 2>/dev/null || true
            ln -sf bazel-bin/node primihub-node
            ln -sf bazel-bin/cli primihub-cli
            tar zcfh primihub-linux-arm64.tar.gz bazel-bin/cli bazel-bin/node primihub-cli primihub-node \
              bazel-bin/task_main \
              bazel-bin/src/primihub/pybind_wrapper/opt_paillier_c2py.so \
              bazel-bin/src/primihub/pybind_wrapper/linkcontext.so \
              bazel-bin/src/primihub/task/pybind_wrapper/ph_secure_lib.so \
              start_server.sh stop_server.sh client_run.sh python config example data
            echo "BUILD OK; tarball bytes: $(stat -c%s primihub-linux-arm64.tar.gz)"
          '

      - name: upload arm64 tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: primihub-linux-arm64
          path: primihub-linux-arm64.tar.gz

      - name: build runtime image (Dockerfile.release)
        run: |
          [ -f primihub-linux-amd64.tar.gz ] || : > primihub-linux-amd64.tar.gz
          TAG=ci-arm64-${GITHUB_SHA::8}
          docker build -f Dockerfile.release -t "$REG/primihub-node:$TAG" -t "$REG/primihub-node:ci-arm64-latest" .
          echo "IMAGE=$REG/primihub-node:$TAG" >> "$GITHUB_ENV"

      - name: push image (optional)
        if: ${{ github.event.inputs.push == 'true' }}
        env:
          ACR_USER: ${{ secrets.ACR_USER }}
          ACR_PASS: ${{ secrets.ACR_PASS }}
        run: |
          if [ -n "$ACR_USER" ]; then
            echo "$ACR_PASS" | docker login "$REG" -u "$ACR_USER" --password-stdin
            docker push "$REG/primihub-node:ci-arm64-latest"
            docker push "$IMAGE"
          else
            echo "no ACR creds secret; skipping push. tarball artifact is available for manual deploy."
          fi
