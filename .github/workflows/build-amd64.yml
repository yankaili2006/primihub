name: build node image (amd64, CN self-hosted)

# Manual trigger. Builds the node (bazel, glibc2.31 focal container) + the
# runtime image (Dockerfile.release, which setup.py-installs the fixed python
# package). Runs on the .50 self-hosted runner (has gitee key, OSS distdir,
# ph-build-focal image, mihomo proxy).
on:
  workflow_dispatch:
    inputs:
      push:
        description: 'push image to aliyun registry'
        required: false
        default: 'false'

jobs:
  build-node-amd64:
    runs-on: [self-hosted, Linux, X64]
    env:
      REG: registry.cn-beijing.aliyuncs.com/primihub
    steps:
      - name: checkout from local mirror (github clone is GFW-throttled on .50)
        run: |
          shopt -s dotglob
          rsync -a --delete --exclude='.git/index.lock' --exclude='bazel-*' \
            --exclude='_work' /mnt/data1/github/primihub/ ./
          git rev-parse HEAD 2>/dev/null || true

      - name: apply CN build config
        run: bash ci/cn-build/setup.sh

      - name: ensure ph-build-focal:cn (ACR 优先, 缺则本地构建并回推)
        run: |
          # 根治 "docker.io/ph-build-focal:cn 403"(runner 无预置镜像时默认走 daocloud):
          # 本地有则用; 否则从 ACR 拉; 拉不到则从 Dockerfile.ph-build-focal 构建并回推 ACR(自愈)。
          if docker image inspect ph-build-focal:cn >/dev/null 2>&1; then
            echo "ph-build-focal:cn 本地已存在"
          elif docker pull "$REG/ph-build-focal:cn"; then
            docker tag "$REG/ph-build-focal:cn" ph-build-focal:cn
            echo "从 ACR 拉取 ph-build-focal:cn"
          else
            echo "ACR 无, 本地构建并回推 ACR"
            docker build -f Dockerfile.ph-build-focal -t ph-build-focal:cn -t "$REG/ph-build-focal:cn" .
            docker push "$REG/ph-build-focal:cn" || true
          fi

      - name: bazel build node (focal glibc2.31 container)
        run: |
          docker run --rm --network host \
            -v "$PWD":/src \
            -v /tmp/ph_distdir:/distdir \
            -v "$HOME/.ssh_rw":/root/.ssh_rw:ro \
            ph-build-focal:cn bash /src/ci/cn-build/build-node.sh

      - name: build runtime image (Dockerfile.release)
        run: |
          # Dockerfile.release COPYs both amd64 and arm64 tarballs; provide a stub arm64.
          [ -f primihub-linux-arm64.tar.gz ] || : > primihub-linux-arm64.tar.gz
          TAG=ci-amd64-${GITHUB_SHA::8}
          docker build -f Dockerfile.release -t "$REG/primihub-node:$TAG" -t "$REG/primihub-node:ci-amd64-latest" .
          echo "IMAGE=$REG/primihub-node:$TAG" >> "$GITHUB_ENV"

      - name: push image (optional)
        if: ${{ github.event.inputs.push == 'true' }}
        run: |
          docker push "$REG/primihub-node:ci-amd64-latest"
          docker push "$IMAGE"
