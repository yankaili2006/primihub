name: primihub CI/CD actions

on:
  # push:
  #   branches:
  #    - master
  #    - develop
  #    - workflow # for test
  #   # Publish semver tags as releases.
  #   tags: [ '*' ]
  pull_request:
    branches:
      - develop

jobs:

  build-on-ubuntu-amd64:
    runs-on: [self-hosted, Linux, X64]
    steps:
    - uses: actions/checkout@v3
    - name: bazel test
      run: |
        bash pre_build.sh
        bazel build --config=linux_`arch` \
            //test/primihub/algorithm:logistic_test \
            //test/primihub/protocol:psi_protocol_test \
            //test/primihub/protocol:pir_protocol_test \
            //test/primihub/protocol:protocol_aby3_encryptor_test \
            //test/primihub/protocol:protocol_aby3_sh3_gen_test \
            //test/primihub/protocol:share_test

        ./bazel-bin/test/primihub/algorithm/logistic_test
        ./bazel-bin/test/primihub/protocol/psi_protocol_test
        ./bazel-bin/test/primihub/protocol/pir_protocol_test
        ./bazel-bin/test/primihub/protocol/protocol_aby3_encryptor_test
        ./bazel-bin/test/primihub/protocol/protocol_aby3_sh3_gen_test
        ./bazel-bin/test/primihub/protocol/share_test
    - name: bazel build
      run: |
        # cc_binary
        make

